/* ── Scoring ── */
function pts(user){
  var pr=uPronos(user),res=LS.gr(),p=0,ex=0,ok=0,pl=0,ids=Object.keys(pr);
  for(var i=0;i<ids.length;i++){
    var pn=pr[ids[i]],r=res[ids[i]]; if(!r) continue; pl++;
    if(pn.h===r.h&&pn.a===r.a){p+=3;ex++;}
    else if(Math.sign(pn.h-pn.a)===Math.sign(r.h-r.a)){p+=1;ok++;}
  }
  return {p:p,ex:ex,ok:ok,pl:pl};
}
function ptBadge(id,user){
  var pn=uPronos(user)[id],r=getRes(id); if(!pn||!r) return null;
  if(pn.h===r.h&&pn.a===r.a) return 'ex';
  return Math.sign(pn.h-pn.a)===Math.sign(r.h-r.a)?'ok':'no';
}
function lb(){
  var u=LS.gu(),keys=Object.keys(u),arr=[];
  for(var i=0;i<keys.length;i++){
    var k=keys[i];
    if(k===ADMIN) continue; /* admin exclu du classement */
    var st=pts(k),pr=uPronos(k);
    arr.push({k:k,ps:psd(k),np:Object.keys(pr).length,p:st.p,ex:st.ex,ok:st.ok,pl:st.pl});
  }
  arr.sort(function(a,b){ return b.p-a.p||b.ex-a.ex||b.ok-a.ok; });
  return arr;
}

/* ── Group standings ── */
function standings(g){
  var teams=GR[g],res=LS.gr(),tb={};
  for(var i=0;i<teams.length;i++) tb[teams[i]]={j:0,g:0,n:0,p:0,bp:0,bc:0,d:0,pts:0};
  for(var mi=0;mi<M.length;mi++){
    var m=M[mi]; if(m.ph!=='POULES'||m.gr!==g) continue;
    var r=res[m.id]; if(!r) continue;
    var h=r.h,a=r.a;
    tb[m.h].j++;tb[m.a].j++;
    tb[m.h].bp+=h;tb[m.h].bc+=a;
    tb[m.a].bp+=a;tb[m.a].bc+=h;
    if(h>a){tb[m.h].g++;tb[m.h].pts+=3;tb[m.a].p++;}
    else if(h<a){tb[m.a].g++;tb[m.a].pts+=3;tb[m.h].p++;}
    else{tb[m.h].n++;tb[m.h].pts++;tb[m.a].n++;tb[m.a].pts++;}
    tb[m.h].d=tb[m.h].bp-tb[m.h].bc;
    tb[m.a].d=tb[m.a].bp-tb[m.a].bc;
  }
  var arr=[];
  for(var ti=0;ti<teams.length;ti++) arr.push(Object.assign({name:teams[ti]},tb[teams[ti]]));
  arr.sort(function(a,b){ return b.pts-a.pts||b.d-a.d||b.bp-a.bp; });
  return arr;
}

/* ── Auto-fetch scores (football-data.org) ── */
function autoFetch(){
  var key=LS.gkey(); if(!key){ toast('Clé API manquante',true); return; }
  var now=new Date(), res=LS.gr(), updated=0;
  var toFetch=[];
  for(var i=0;i<M.length;i++){
    var m=M[i]; if(res[m.id]) continue;
    var dt=new Date(m.dt+'T'+m.ti);
    if((now-dt)>7200000) toFetch.push(m); /* 2h après le début */
  }
  if(!toFetch.length){ toast('Aucun match à synchroniser'); return; }
  toast('Synchronisation en cours...');
  fetch('https://api.football-data.org/v4/competitions/WC/matches?status=FINISHED',{
    headers:{'X-Auth-Token':key}
  }).then(function(r){ return r.json(); })
  .then(function(data){
    var matches=data.matches||[];
    for(var i=0;i<matches.length;i++){
      var am=matches[i];
      if(!am.score||!am.score.fullTime) continue;
      var fh=am.homeTeam.shortName||am.homeTeam.name;
      var fa=am.awayTeam.shortName||am.awayTeam.name;
      var sc=am.score.fullTime;
      for(var j=0;j<M.length;j++){
        if(res[M[j].id]) continue;
        var hMatch=M[j].h.toLowerCase().indexOf(fh.toLowerCase())>-1||fh.toLowerCase().indexOf(M[j].h.toLowerCase().split(' ')[0])>-1;
        var aMatch=M[j].a.toLowerCase().indexOf(fa.toLowerCase())>-1||fa.toLowerCase().indexOf(M[j].a.toLowerCase().split(' ')[0])>-1;
        if(hMatch&&aMatch&&sc.home!==null&&sc.away!==null){
          setRes(M[j].id,sc.home,sc.away); updated++; break;
        }
      }
    }
    toast(updated>0?updated+' score(s) mis à jour ✓':'Aucun score trouvé');
    if(updated>0) render();
  }).catch(function(){ toast('Erreur API — vérifiez la clé',true); });
}

function pgMatchs(){

     +'</div><button class="btn-g" onclick="hLogin()">Jouer</button></div>'
     +'<div id="lerr" style="color:var(--red);font-size:.78rem;margin-top:5px"></div></div>';
  }
  var tabsH='<div class="tabs">';
  for(var pi=0;pi<phases.length;pi++){
    var p=phases[pi];
    tabsH+='<button class="tb'+(S.tab===p?' on':'')+'" onclick="setTab(\''+p+'\')">'+labels[p]+'</button>';
  }
  tabsH+='</div>';

    grpH='<div class="gf"><button class="gb'+(S.grp==='ALL'?' on':'')+'" onclick="setGrp(\'ALL\')">Tous groupes</button>';

function cardMatch(m){
  var res=getRes(m.id),pr=S.user?uPronos(S.user):{},pn=pr[m.id]||null;
  var dt=new Date(m.dt+'T'+m.ti),started=(new Date())>=dt;
  var ptb=(S.user&&S.user!==ADMIN&&pn&&res)?ptBadge(m.id,S.user):null;
  var dateStr=dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' &middot; '+m.ti;
  var scoreBlock=res
    ?('<div class="sd"><div class="sb2">'+res.h+'</div><span style="color:var(--muted);margin:0 2px">-</span><div class="sb2">'+res.a+'</div></div>')
    :'<div style="color:var(--muted);font-size:1.4rem;font-weight:900">VS</div>';
  var pronoBlock='';
  if(S.user&&S.user!==ADMIN){
    var dis=(started&&!adminMode)?' disabled':'';
    var badgeH=ptb==='ex'?'<span class="badge ex">&#127919; +3pts</span>':ptb==='ok'?'<span class="badge ok">&#10003; +1pt</span>':ptb==='no'?'<span class="badge no">&#10007; 0pt</span>':'';
    var saveBtn=started?'':'<button class="psb" onclick="hSavePr('+m.id+')">&#128190; OK</button>';
    pronoBlock='<div class="pr">'
     +'<input class="pi" type="number" min="0" max="20" id="ph'+m.id+'" value="'+(pn?pn.h:'')+'" placeholder="?"'+dis+'>'
     +'<span style="color:var(--muted)">-</span>'
     +'<input class="pi" type="number" min="0" max="20" id="pa'+m.id+'" value="'+(pn?pn.a:'')+'" placeholder="?"'+dis+'>'
     +saveBtn+badgeH+'</div>';
    if(started&&!res) pronoBlock+='<div style="font-size:.72rem;color:var(--muted);text-align:center;margin-top:4px">&#128274; Match d&eacute;but&eacute;</div>';
  } else if(!S.user||S.user===ADMIN){
    pronoBlock='<div style="font-size:.73rem;color:var(--muted);text-align:right;margin-top:8px">&#128274; Connexion requise</div>';
  }
  var adminBlock='';
  if(adminMode&&isAdmin()){
    var delBtn=res?('<button class="rsb" onclick="hDelRes('+m.id+')" style="color:var(--red)">&#10005;</button>'):'';
    adminBlock='<div class="rrow">'
     +'<span style="font-size:.7rem;color:var(--muted)">&#128737; Score r&eacute;el:</span>'
     +'<input class="ri" type="number" min="0" max="20" id="rh'+m.id+'" value="'+(res?res.h:'')+'" placeholder="0">'
     +'<span style="color:var(--muted)">-</span>'
     +'<input class="ri" type="number" min="0" max="20" id="ra'+m.id+'" value="'+(res?res.a:'')+'" placeholder="0">'
     +'<button class="rsb" onclick="hSetRes('+m.id+')">&#10003;</button>'+delBtn+'</div>';
  }
  var tvH=tvTag(m.id);
  return '<div class="mc'+(pn&&S.user!==ADMIN?' hp':'')+(res?' fin':'')+'">'
   +'<div class="mh"><span class="mtag">Match #'+m.id+(m.gr?' &middot; Grp '+m.gr:'')+'</span>'
   +'<span class="ms'+(res?' fin':'')+'">'+(res?'TERMIN&Eacute;':'&Agrave; VENIR')+'</span></div>'
   +'<div class="mteams">'
   +'<div class="team"><span class="tf">'+flag(m.h)+'</span><div class="tn">'+m.h+'</div></div>'
   +'<div style="text-align:center">'+scoreBlock+'</div>'
   +'<div class="team" style="text-align:right"><span class="tf">'+flag(m.a)+'</span><div class="tn">'+m.a+'</div></div>'
   +'</div>'+pronoBlock+adminBlock
   +'<div class="mf2"><span>&#128197; '+dateStr+' &middot; &#128205; '+m.v+'</span>'+(tvH?'<span>'+tvH+'</span>':'')+'</div>'
   +'</div>';
}

function setTab(t){ S.tab=t; S.grp='ALL'; render(); }

function tAdm(){ S.adm=!S.adm; render(); }

function hLogin(){
  var p=document.getElementById('lp')?document.getElementById('lp').value.trim():'';
  var pw=document.getElementById('lpw')?document.getElementById('lpw').value:'';
  var r=doLogin(p,pw);
  if(r.ok){ toast('Bienvenue '+psd(S.user)+' !'); render(); }
  else{ var e=document.getElementById('lerr'); if(e) e.textContent=r.msg; }
}
function hSavePr(id){
  var hv=document.getElementById('ph'+id)?document.getElementById('ph'+id).value:'';
  var av=document.getElementById('pa'+id)?document.getElementById('pa'+id).value:'';
  if(hv===''||av===''){ toast('Entre les deux scores !',true); return; }
  savePr(id,hv,av); toast('Pronostic enregistr\u00e9 \u2713'); render();
}
function hSetRes(id){
  if(!isAdmin()){ toast('Acc\u00e8s refus\u00e9',true); return; }
  var hv=document.getElementById('rh'+id)?document.getElementById('rh'+id).value:'';
  var av=document.getElementById('ra'+id)?document.getElementById('ra'+id).value:'';
  if(hv===''||av===''){ toast('Score incomplet !',true); return; }
  setRes(id,hv,av); toast('Score enregistr\u00e9 \u2713'); render();
}
function hDelRes(id){
  if(!isAdmin()){ toast('Acc\u00e8s refus\u00e9',true); return; }
  delRes(id); toast('Score supprim\u00e9'); render();
}
function hCpw(){
  var o=document.getElementById('opw')?document.getElementById('opw').value:'';
  var n=document.getElementById('npw')?document.getElementById('npw').value:'';
  var r=chgPw(o,n);
  if(r.ok){ toast('Mot de passe modifi\u00e9 \u2713'); S.cpw=false; render(); }
  else{ var e=document.getElementById('cpwe'); if(e) e.textContent=r.msg; }
}
function hTogAdm(){
  if(!isAdmin()){ toast('Acc\u00e8s refus\u00e9',true); return; }
  var pin=document.getElementById('apm')?document.getElementById('apm').value:'';
  var e=document.getElementById('ame');
  if(pin!==LS.pin()){ if(e){ e.textContent='PIN incorrect.'; } return; }
  adminMode=!adminMode; toast(adminMode?'&#128274; Mode admin activ\u00e9':'&#128275; Mode admin d\u00e9sactiv\u00e9'); render();
}
function hAdmReset(){
  var p=document.getElementById('ap')?document.getElementById('ap').value:'';
  var n=document.getElementById('anp')?document.getElementById('anp').value:'';
  var pin=document.getElementById('apin')?document.getElementById('apin').value:'';
  var r=admReset(p,n,pin),e=document.getElementById('ae');
  if(e){ e.textContent=r.ok?'R\u00e9initialis\u00e9 !':r.msg; e.style.color=r.ok?'var(--grn)':'var(--red)'; }
  if(r.ok) toast('Mot de passe r\u00e9initialis\u00e9 \u2713');
}
function hDelUser(){
  if(!isAdmin()){ toast('Acc\u00e8s refus\u00e9',true); return; }
  var pseudo=document.getElementById('dup')?document.getElementById('dup').value.trim().toLowerCase():'';
  var pin=document.getElementById('dpin')?document.getElementById('dpin').value:'';
  var e=document.getElementById('de');
  if(!pseudo){ if(e){e.textContent='Entre un pseudo.';e.style.color='var(--red)';} return; }
  if(pin!==LS.pin()){ if(e){e.textContent='PIN incorrect.';e.style.color='var(--red)';} return; }
  if(pseudo===ADMIN){ if(e){e.textContent='Impossible de supprimer le compte admin.';e.style.color='var(--red)';} return; }
  var u=LS.gu(); if(!u[pseudo]){ if(e){e.textContent='Joueur introuvable.';e.style.color='var(--red)';} return; }
  delete u[pseudo]; LS.su(u);
  var p2=LS.gp(); delete p2[pseudo]; LS.sp(p2);
  toast('Compte supprim\u00e9 \uD83D\uDDD1'); render();
}
function hChgPin(){
  var o=document.getElementById('opin')?document.getElementById('opin').value:'';
  var n=document.getElementById('npin')?document.getElementById('npin').value:'';
  var e=document.getElementById('pe');
  if(o!==LS.pin()){ if(e){e.textContent='PIN actuel incorrect.';e.style.color='var(--red)';} return; }
  if(!n||n.length<3){ if(e){e.textContent='PIN trop court.';e.style.color='var(--red)';} return; }
  LS.spin(n); if(e){e.textContent='PIN modifi\u00e9 \u2713';e.style.color='var(--grn)';}
}
function hSaveKey(){
  var k=document.getElementById('apikey')?document.getElementById('apikey').value.trim():'';
  LS.skey(k); toast('Cl\u00e9 API enregistr\u00e9e \u2713');
  var e=document.getElementById('synce'); if(e) e.textContent='Cl\u00e9 sauvegard\u00e9e. Cliquez Sync pour tester.';
}

/* ── Auto-poll every 5 min when admin logged in ── */
function startAutoPoll(){
  setInterval(function(){
    if(isAdmin()&&adminMode&&LS.gkey()) autoFetch();
  }, 300000);
}

/* ── Event delegation ── */
document.addEventListener('click',function(e){
  if(e.target.classList.contains('xbtn')){
    var k=e.target.getAttribute('data-k'),inp=document.getElementById('dup');
    if(inp&&k){ inp.value=k; inp.focus(); }
  }
  if(e.target.id==='tpwbtn'){
    var pw=document.getElementById('lpw');
    if(pw){ pw.type=pw.type==='password'?'text':'password'; e.target.textContent=pw.type==='password'?'\uD83D\uDC41':'\uD83D\uDE48'; }
  }
});
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var lp=document.getElementById('lp'),lpw=document.getElementById('lpw');
    if(lp&&lpw&&(document.activeElement===lp||document.activeElement===lpw)) hLogin();
  }
});

/* ── Mobile ── */
document.getElementById('ham').addEventListener('click',function(){ document.getElementById('sb').classList.toggle('open'); document.getElementById('ov').classList.toggle('open'); });
document.getElementById('ov').addEventListener('click',function(){ document.getElementById('sb').classList.remove('open'); document.getElementById('ov').classList.remove('open'); });

/* ── PWA / SW ── */
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(r){ for(var i=0;i<r.length;i++) r[i].unregister(); });
  setTimeout(function(){ navigator.serviceWorker.register('./sw.js').catch(function(){}); },1500);
}

/* ── Init ── */
var ses=localStorage.getItem('cdm_ses');
if(ses&&LS.gu()[ses]) S.user=ses;
render();
startAutoPoll();

</script>
</body>
</html>
