<!DOCTYPE html>
<html lang="fr">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prono CDM 26</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f5a623;--gold2:#ffbb44;--gdim:rgba(245,166,35,.15);
  --bg:#111;--card:#1c1c1c;--nav:#0d0d0d;--inp:#222;
  --txt:#fff;--muted:#888;--bdr:#2a2a2a;
  --grn:#22c55e;--red:#ef4444;--sw:260px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);display:flex;min-height:100vh}
/* SIDEBAR */
.sb{width:var(--sw);background:var(--nav);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;border-right:1px solid var(--bdr)}
.sb-logo{padding:20px;display:flex;align-items:center;gap:10px;color:var(--gold);font-weight:800;font-size:1.1rem;border-bottom:1px solid var(--bdr);cursor:pointer;user-select:none}
.sb-nav{padding:12px 0;flex:1}
.ni{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;color:var(--muted);font-size:.95rem;transition:all .15s;user-select:none}
.ni:hover{color:var(--txt);background:rgba(255,255,255,.05)}
.ni.on{background:var(--gold);color:#000;font-weight:700;margin:2px 12px;border-radius:8px}
.ni .ic{font-size:1rem;width:20px;text-align:center}
/* MAIN */
.main{margin-left:var(--sw);flex:1;padding:32px;min-height:100vh}
/* CARDS */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-top:24px}
.sc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px}
.sl{color:var(--muted);font-size:.82rem;display:flex;align-items:center;justify-content:space-between}
.sv{font-size:1.9rem;font-weight:800;margin-top:8px}
.ss{color:var(--muted);font-size:.78rem;margin-top:4px}
.ss.g{color:var(--gold)}
.pb{height:4px;background:var(--bdr);border-radius:2px;margin-top:8px}
.pf{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
/* HEADINGS */
.pt{font-size:2.5rem;font-weight:900;text-transform:uppercase;letter-spacing:-.5px}
.ps{color:var(--muted);margin-top:6px;font-size:.88rem}
/* TABS */
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px}
.tb{padding:8px 14px;border-radius:6px;border:1px solid var(--bdr);background:var(--card);color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:600;letter-spacing:.5px;transition:all .15s}
.tb:hover{color:var(--txt);border-color:#444}
.tb.on{background:var(--gold);color:#000;border-color:var(--gold)}
/* GROUP FILTER */
.gf{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.gb{width:36px;height:36px;border-radius:6px;border:1px solid var(--bdr);background:var(--card);color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s}
.gb.w{width:auto;padding:0 14px}
.gb:hover{color:var(--txt);border-color:#444}
.gb.on{background:var(--gold);color:#000;border-color:var(--gold)}
/* MATCHES GRID */
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px;margin-top:16px}
/* MATCH CARD */
.mc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;transition:border-color .15s}
.mc:hover{border-color:#444}
.mc.hp{border-left:3px solid var(--gold)}
.mc.fin{border-left:3px solid var(--grn)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.73rem;color:var(--muted)}
.mtag{font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.ms{padding:3px 8px;border-radius:4px;font-size:.68rem;font-weight:700;border:1px solid var(--bdr)}
.ms.fin{background:#333;color:#aaa}
.mteams{display:flex;align-items:center;justify-content:space-between;gap:8px}
.team{flex:1}
.tn{font-weight:700;font-size:.9rem}
.tf{font-size:1.4rem;display:block;margin-bottom:4px}
.sd{display:flex;align-items:center;gap:4px}
.sb2{background:var(--bg);border:1px solid var(--bdr);border-radius:6px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800}
/* PRONO */
.pr{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.pi{width:44px;height:44px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:1.1rem;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield}
.pi::-webkit-outer-spin-button,.pi::-webkit-inner-spin-button{-webkit-appearance:none}
.pi:focus{border-color:var(--gold)}
.pi:disabled{opacity:.45}
.psb{padding:8px 14px;background:var(--gold);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.83rem}
.psb:hover{background:var(--gold2)}
.mf{margin-top:8px;font-size:.73rem;color:var(--muted);display:flex;justify-content:space-between}
/* RESULT INPUT */
.ri{width:38px;height:32px;background:#1a1a2e;border:1px solid #3a3a6e;border-radius:6px;color:var(--gold);font-size:.9rem;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield}
.ri::-webkit-outer-spin-button,.ri::-webkit-inner-spin-button{-webkit-appearance:none}
.rsb{padding:5px 10px;background:#3a3a6e;color:#aaa;border:none;border-radius:6px;font-size:.7rem;cursor:pointer}
.rsb:hover{background:#5a5aae;color:#fff}
.rrow{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr);flex-wrap:wrap}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:.7rem;font-weight:700}
.badge.ex{background:rgba(245,166,35,.2);color:var(--gold)}
.badge.ok{background:rgba(34,197,94,.2);color:var(--grn)}
.badge.no{background:rgba(239,68,68,.1);color:#888}
/* LOGIN BANNER */
.lb2{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px 20px;margin-bottom:20px}
.lb2 h3{font-size:.95rem;margin-bottom:4px}
.lb2 p{font-size:.79rem;color:var(--muted);margin-bottom:12px}
.lf{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.fi{padding:10px 14px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:.9rem;outline:none;flex:1;min-width:160px}
.fi:focus{border-color:var(--gold)}
::placeholder{color:var(--muted)}
.btn-g{padding:10px 20px;background:var(--gold);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.9rem;white-space:nowrap}
.btn-g:hover{background:var(--gold2)}
.btn-o{padding:8px 14px;background:transparent;color:var(--muted);border:1px solid var(--bdr);border-radius:8px;font-size:.83rem;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-o:hover{color:var(--txt);border-color:#555}
/* CLASSEMENT */
.rt{width:100%;border-collapse:collapse;margin-top:16px}
.rt th{padding:10px 14px;text-align:left;font-size:.78rem;color:var(--muted);border-bottom:1px solid var(--bdr);font-weight:600}
.rt th.r{text-align:right}
.rt th.gd{color:var(--gold)}
.rt td{padding:12px 14px;border-bottom:1px solid var(--bdr);font-size:.88rem}
.rt tr:last-child td{border-bottom:none}
.rt tr:hover td{background:rgba(255,255,255,.03)}
.rn{font-weight:700;color:var(--muted)}
.rn.t{color:var(--gold)}
.rp{font-weight:600}
.rpts{font-weight:800;color:var(--gold);text-align:right}
.rnc{text-align:right;color:var(--muted)}
/* GROUPES */
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px;margin-top:24px}
.gc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
.ghd{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--bdr)}
.gbadge{background:var(--gold);color:#000;font-weight:900;font-size:.72rem;padding:3px 8px;border-radius:4px}
.gl{font-weight:800;font-size:1.05rem}
.gt{width:100%;border-collapse:collapse}
.gt th{padding:6px 10px;text-align:center;font-size:.68rem;color:var(--muted);border-bottom:1px solid var(--bdr);font-weight:600}
.gt th:first-child{text-align:left;padding-left:16px}
.gt td{padding:8px 10px;text-align:center;font-size:.78rem;border-bottom:1px solid rgba(42,42,42,.5)}
.gt td:first-child{text-align:left;padding-left:16px}
.gt tr:last-child td{border-bottom:none}
.gt .rc{color:var(--muted);font-weight:600;width:20px}
.gt .tc{font-weight:700}
.gt .pc{color:var(--gold);font-weight:800}
.qual{background:rgba(34,197,94,.04)}
/* PROFIL */
.phd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.pi2{display:flex;align-items:center;gap:16px}
.av{width:54px;height:54px;background:var(--gdim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:2px solid var(--gold)}
.pn{font-size:1.7rem;font-weight:900}
.psu{color:var(--muted);font-size:.83rem}
.pac{display:flex;gap:8px;flex-wrap:wrap}
.psg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.psc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;text-align:center}
.psi{font-size:1.2rem;margin-bottom:6px}
.psv{font-size:1.7rem;font-weight:900}
.psl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
/* PRONO LIST */
.pli{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr);font-size:.83rem;gap:8px;flex-wrap:wrap}
.pli:last-child{border-bottom:none}
.pmn{font-weight:600;flex:1}
.psc2{font-weight:800;color:var(--gold);white-space:nowrap}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--gold);color:var(--gold);padding:11px 18px;border-radius:8px;font-weight:600;font-size:.88rem;z-index:1000;animation:tIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.err{border-color:var(--red);color:var(--red)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* ADMIN */
.adm-tog{display:flex;align-items:center;gap:8px;color:var(--muted);cursor:pointer;font-size:.83rem;user-select:none}
.adm-tog:hover{color:var(--txt)}
.adm-pan{background:rgba(90,90,174,.1);border:1px solid #3a3a6e;border-radius:10px;padding:16px;margin-top:12px}
.adm-pan h4{font-size:.88rem;margin-bottom:10px}
/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:.9rem}
/* MOBILE */
.ham{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 10px;cursor:pointer;font-size:1.1rem;color:var(--txt)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99}
/* HERO */
.htag{color:var(--gold);font-size:.83rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.htitle{font-size:2.8rem;font-weight:900;line-height:1.05}
.hsub{color:var(--muted);margin-top:10px;max-width:520px;line-height:1.6}
.sec-title{font-size:.85rem;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;margin-top:28px}
@media(max-width:768px){
  .ham{display:flex;align-items:center;justify-content:center}
  .sb{transform:translateX(-100%);transition:transform .3s ease}
  .sb.open{transform:translateX(0)}
  .ov.open{display:block}
  .main{margin-left:0;padding:16px;padding-top:56px}
  .pt{font-size:1.8rem}
  .mg{grid-template-columns:1fr}
  .gg{grid-template-columns:1fr}
  .phd{flex-direction:column}
  .psg{grid-template-columns:repeat(2,1fr)}
  .sg{grid-template-columns:repeat(2,1fr)}
  .lf{flex-direction:column}
  .fi{width:100%}
  .htitle{font-size:2rem}
}
</style>
</head>

// ── STORAGE ──────────────────────────────────────────────────
const LS={
  gu:()=>JSON.parse(localStorage.getItem('cdm_u')||'{}'),
  su:u=>localStorage.setItem('cdm_u',JSON.stringify(u)),
  gp:()=>JSON.parse(localStorage.getItem('cdm_p')||'{}'),
  sp:p=>localStorage.setItem('cdm_p',JSON.stringify(p)),
  gr:()=>JSON.parse(localStorage.getItem('cdm_r')||'{}'),
  sr:r=>localStorage.setItem('cdm_r',JSON.stringify(r)),
  pin:()=>localStorage.getItem('cdm_pin')||'1234',
  spin:p=>localStorage.setItem('cdm_pin',p)
};

function hsh(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(16)}
function psd(k){const u=LS.gu();return u[k]?.pseudo||k}

// ── AUTH ─────────────────────────────────────────────────────
function doLogin(pseudo,pw){
  if(!pseudo||!pw)return{ok:false,msg:'Remplis tous les champs.'};
  const u=LS.gu(),k=pseudo.toLowerCase().trim(),h=hsh(pw);
  if(u[k]){if(u[k].hash!==h)return{ok:false,msg:'Mot de passe incorrect.'}}
  else{u[k]={hash:h,pseudo:pseudo.trim(),at:Date.now()};LS.su(u)}
  S.user=k;localStorage.setItem('cdm_ses',k);return{ok:true}
}
function doLogout(){S.user=null;localStorage.removeItem('cdm_ses');go('accueil')}
function chgPw(o,n){
  const u=LS.gu(),uu=u[S.user];
  if(!uu)return{ok:false,msg:'Introuvable'};
  if(uu.hash!==hsh(o))return{ok:false,msg:'Ancien mdp incorrect'};
  if(n.length<3)return{ok:false,msg:'Nouveau mdp trop court'};
  uu.hash=hsh(n);LS.su(u);return{ok:true}
}
function admReset(pseudo,np,pin){
  if(pin!==LS.pin())return{ok:false,msg:'PIN admin incorrect'};
  const u=LS.gu(),k=pseudo.toLowerCase().trim();
  if(!u[k])return{ok:false,msg:'Joueur introuvable'};
  u[k].hash=hsh(np);LS.su(u);return{ok:true}
}

// ── PRONOS ───────────────────────────────────────────────────
function savePr(id,h,a){
  if(!S.user)return;
  const p=LS.gp();if(!p[S.user])p[S.user]={};
  p[S.user][id]={h:+h,a:+a};LS.sp(p)
}
function delPr(id){
  if(!S.user)return;const p=LS.gp();
  if(p[S.user])delete p[S.user][id];LS.sp(p)
}
function uPronos(u){const p=LS.gp();return p[u]||{}}

// ── SCORING ──────────────────────────────────────────────────
function setRes(id,h,a){const r=LS.gr();r[id]={h:+h,a:+a};LS.sr(r)}
function delRes(id){const r=LS.gr();delete r[id];LS.sr(r)}
function getRes(id){return LS.gr()[id]||null}

function pts(user){
  const pr=uPronos(user),res=LS.gr();
  let p=0,ex=0,ok=0,pl=0;
  for(const[id,pn]of Object.entries(pr)){
    const r=res[id];if(!r)continue;pl++;
    if(pn.h===r.h&&pn.a===r.a){p+=3;ex++}
    else if(Math.sign(pn.h-pn.a)===Math.sign(r.h-r.a)){p+=1;ok++}
  }
  return{p,ex,ok,pl}
}
function ptBadge(id,user){
  const pn=uPronos(user)[id],r=getRes(id);
  if(!pn||!r)return null;
  if(pn.h===r.h&&pn.a===r.a)return'ex';
  return Math.sign(pn.h-pn.a)===Math.sign(r.h-r.a)?'ok':'no'
}
function lb(){
  const u=LS.gu();
  return Object.keys(u).map(k=>{
    const st=pts(k),pr=uPronos(k);
    return{k,ps:psd(k),np:Object.keys(pr).length,...st}
  }).sort((a,b)=>b.p-a.p||b.ex-a.ex||b.ok-a.ok)
}

// ── GROUP STANDINGS ──────────────────────────────────────────
function standings(g){
  const teams=GR[g],res=LS.gr(),tb={};
  teams.forEach(t=>{tb[t]={j:0,g:0,n:0,p:0,bp:0,bc:0,d:0,pts:0}});
  M.filter(m=>m.ph==='POULES'&&m.gr===g).forEach(m=>{
    const r=res[m.id];if(!r)return;
    const{h,a}=r;
    tb[m.h].j++;tb[m.a].j++;
    tb[m.h].bp+=h;tb[m.h].bc+=a;
    tb[m.a].bp+=a;tb[m.a].bc+=h;
    if(h>a){tb[m.h].g++;tb[m.h].pts+=3;tb[m.a].p++}
    else if(h<a){tb[m.a].g++;tb[m.a].pts+=3;tb[m.h].p++}
    else{tb[m.h].n++;tb[m.h].pts++;tb[m.a].n++;tb[m.a].pts++}
    tb[m.h].d=tb[m.h].bp-tb[m.h].bc;
    tb[m.a].d=tb[m.a].bp-tb[m.a].bc;
  });
  return teams.map(t=>({name:t,...tb[t]})).sort((a,b)=>b.pts-a.pts||b.d-a.d||b.bp-a.bp)
}

    <span style="color:var(--muted)">-</span>
    <input class="pi" type="number" min="0" max="20" id="pa${m.id}" value="${pn?pn.a:''}" placeholder="?"${started&&!_adm?' disabled':''}>
    ${!started?`<button class="psb" onclick="hSavePr(${m.id})">💾 OK</button>`:''}
    ${ptb?`<span class="badge ${ptb}">${ptb==='ex'?'🎯 +3pts':ptb==='ok'?'✓ +1pt':'✗ 0pt'}</span>`:''}
  </div>
  ${started&&!res?'<div style="font-size:.72rem;color:var(--muted);text-align:center;margin-top:5px">🔒 Match débuté</div>':''}
  `:`<div class="mf"><span></span><span>🔒 Connexion requise</span></div>`}
  ${_adm&&isAdmin()?`
  <div class="rrow">
    <span style="font-size:.7rem;color:var(--muted)">🛡 Score réel:</span>
    <input class="ri" type="number" min="0" max="20" id="rh${m.id}" value="${res?res.h:''}" placeholder="0">
    <span style="color:var(--muted);font-size:.8rem">-</span>
    <input class="ri" type="number" min="0" max="20" id="ra${m.id}" value="${res?res.a:''}" placeholder="0">
    <button class="rsb" onclick="hSetRes(${m.id})">✓ Save</button>
    ${res?`<button class="rsb" onclick="hDelRes(${m.id})" style="color:var(--red)">✕</button>`:''}
  </div>`:''}
  <div class="mf" style="margin-top:6px">
    <span>📅 ${dateStr}</span><span>📍 ${m.v}</span>
  </div>
</div>`;
}

// ── PAGE: CLASSEMENT ─────────────────────────────────────────

  const board=lb();
  return`
<div class="pt" style="display:flex;align-items:center;gap:10px"><span>🏆</span> CLASSEMENT</div>
<p class="ps">Mesurez-vous aux autres. 3 pts pour score exact, 1 pt pour bon résultat.</p>
<div class="card" style="padding:0;margin-top:20px">
${board.length===0?`<div class="empty">Aucun participant pour le moment.</div>`:`
<table class="rt">
<thead><tr>
<th>#</th><th>Joueur</th>
<th class="r">Score Exact (3p)</th>
<th class="r">Bon Résultat (1p)</th>
<th class="r">Total Pronos</th>

</tr></thead>
<tbody>${board.map((u,i)=>`
<tr style="${u.k===S.user?'background:rgba(245,166,35,.05)':''}">

// ── PAGE: GROUPES ────────────────────────────────────────────
function pgGroupes(){
  return`
<div class="pt">PHASE DE GROUPES</div>
<p class="ps">Classement en temps réel des 12 groupes (A-L).</p>
<div class="gg">${Object.keys(GR).map(g=>{
  const st=standings(g);
  return`<div class="gc">
<div class="ghd"><span class="gbadge">GROUPE</span><span class="gl">${g}</span></div>
<table class="gt">
<thead><tr><th></th><th style="text-align:left">Équipe</th><th>J</th><th>G</th><th>N</th><th>P</th><th>Diff</th><th style="color:var(--gold)">Pts</th></tr></thead>
<tbody>${st.map((t,i)=>`
<tr class="${i<2?'qual':''}">
<td class="rc">${i+1}</td>
<td class="tc">${FL[t.name]||'🏳'} ${t.name}</td>
<td>${t.j}</td><td>${t.g}</td><td>${t.n}</td><td>${t.p}</td>
<td style="color:${t.d>0?'var(--grn)':t.d<0?'var(--red)':'var(--muted)'}">${t.d>0?'+':''}${t.d}</td>
<td class="pc">${t.pts}</td>
</tr>`).join('')}</tbody>
</table></div>`;
}).join('')}</div>`;
}

// ── PAGE: PROFIL ─────────────────────────────────────────────
function pgProfil(){
  if(!S.user)return`
<div class="pt">MON PROFIL</div>
<div style="margin-top:40px;text-align:center">
<div style="font-size:3rem;margin-bottom:16px">👤</div>
<p style="color:var(--muted);margin-bottom:20px">Connectez-vous depuis la page Matchs.</p>
<button class="btn-g" onclick="go('matchs')">Voir les matchs →</button>
</div>`;
  const ps=psd(S.user),st=pts(S.user),pr=uPronos(S.user),res=LS.gr();
  const plist=Object.entries(pr).map(([id,pn])=>{
    const mm=M.find(m=>m.id==id),r=res[id],pt2=getRes(id)?ptBadge(id,S.user):null;
    return{id,pn,mm,r,pt2}
  }).filter(x=>x.mm).sort((a,b)=>a.mm.id-b.mm.id);
  return`
<div class="phd">
  <div class="pi2">
    <div class="av">👤</div>
    <div>
      <div class="pn">${ps.toUpperCase()}</div>
      <div class="psu">${Object.keys(pr).length} pronostics enregistrés</div>
    </div>
  </div>
  <div class="pac">
    <button class="btn-o" onclick="tCpw()">🔒 Changer mdp</button>
    <button class="btn-o" onclick="doLogout()">→ Déconnexion</button>
  </div>
</div>
${S.cpw?`
<div class="card" style="margin-bottom:20px">
<h4 style="margin-bottom:12px">🔒 Changer le mot de passe</h4>
<div style="display:flex;gap:10px;flex-wrap:wrap">
<input class="fi" id="opw" type="password" placeholder="Ancien mot de passe" style="flex:1;min-width:140px">
<input class="fi" id="npw" type="password" placeholder="Nouveau mot de passe" style="flex:1;min-width:140px">
<button class="btn-g" onclick="hCpw()">Modifier</button>
</div>
<div id="cpwe" style="color:var(--red);font-size:.78rem;margin-top:5px"></div>
</div>`:''}
<div class="psg">
<div class="psc"><div class="psi">🏆</div><div class="psv">${st.p}</div><div class="psl">Points</div></div>
<div class="psc"><div class="psi">🎯</div><div class="psv">${st.ex}</div><div class="psl">Scores exacts</div></div>
<div class="psc"><div class="psi" style="color:var(--grn)">✅</div><div class="psv">${st.ok}</div><div class="psl">Bons résultats</div></div>
<div class="psc"><div class="psi">⏱</div><div class="psv">${st.pl}</div><div class="psl">Matchs joués</div></div>
</div>
<h3 style="font-size:.95rem;font-weight:800;margin-bottom:12px">MES PRONOSTICS</h3>
${plist.length===0?`<div class="empty">Pas encore de pronostic. <a onclick="go('matchs')" style="color:var(--gold);cursor:pointer;font-weight:700">Pronostiquer →</a></div>`:`
<div class="card" style="padding:0 20px">
${plist.map(({id,pn,mm,r,pt2})=>`
<div class="pli">
<span class="pmn">${FL[mm.h]||'🏳'} ${mm.h} <span style="color:var(--muted)">vs</span> ${mm.a} ${FL[mm.a]||'🏳'}</span>
<span class="psc2">${pn.h} - ${pn.a}</span>
${r?`<span class="badge ${pt2}">${pt2==='ex'?'🎯 +3':pt2==='ok'?'✓ +1':'✗ 0'}</span>`:'<span style="color:var(--muted);font-size:.72rem">En attente</span>'}
</div>`).join('')}
</div>`}
<div style="margin-top:28px;padding-top:16px;border-top:1px solid var(--bdr)">
${isAdmin()?`<div class="adm-tog" onclick="tAdm()">🛡 Réinitialiser le mot de passe d'un joueur (admin) <span style="margin-left:auto">${S.admVis?'▲':'▼'}</span></div>`:''}
${S.admVis&&isAdmin()?`
<div class="adm-pan">
<h4>🛡 Réinitialisation admin</h4>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
<input class="fi" id="ap" placeholder="Pseudo du joueur" style="flex:1;min-width:130px">
<input class="fi" id="anp" type="password" placeholder="Nouveau mot de passe" style="flex:1;min-width:130px">
<input class="fi" id="apin" type="password" placeholder="PIN admin" style="width:100px" maxlength="6">
<button class="btn-g" onclick="hAdmReset()">Réinitialiser</button>
</div>
<div id="ae" style="font-size:.78rem;margin-bottom:10px"></div>
<hr style="border-color:#3a3a6e;margin:12px 0">
<h4 style="margin-bottom:8px">⚙️ Mode saisie des scores réels</h4>
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
<input class="fi" id="apm" type="password" placeholder="PIN admin" style="width:120px">
<button class="btn-g" onclick="hTogAdm()">${_adm?'🔓 Désactiver':'🔐 Activer'} le mode admin</button>
</div>
<div id="ame" style="color:var(--red);font-size:.78rem;margin-top:5px"></div>
${_adm?'<div style="color:var(--grn);font-size:.78rem;margin-top:5px">✅ Mode admin actif — saisie des scores visible sur chaque match.</div>':''}
<hr style="border-color:#3a3a6e;margin:12px 0">
<h4 style="margin-bottom:8px">🗑 Supprimer un compte joueur</h4>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
<input class="fi" id="dup" placeholder="Pseudo à supprimer" style="flex:1;min-width:140px">
<input class="fi" id="dpin" type="password" placeholder="PIN admin" style="width:100px" maxlength="6">
<button class="btn-g" style="background:#c0392b" onclick="hDelUser()">🗑 Supprimer</button>
</div>
<div id="de" style="font-size:.78rem;margin-bottom:4px"></div>
<div style="font-size:.72rem;color:var(--muted)">⚠️ Supprime le compte ET tous ses pronostics définitivement.</div>
<hr style="border-color:#3a3a6e;margin:12px 0">
<h4 style="margin-bottom:8px">👥 Comptes inscrits</h4>
<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px">
${Object.keys(LS.gu()).filter(k=>k!==ADMIN_USER).map(k=>`
<span style="background:#1a1a2e;border:1px solid #3a3a6e;border-radius:6px;padding:4px 10px;font-size:.78rem;display:flex;align-items:center;gap:6px">
${psd(k)} <span onclick="prefillDel('${k}')" style="cursor:pointer;color:var(--red);font-weight:700;font-size:.9rem">✕</span>
</span>`).join('')||'<span style="color:var(--muted);font-size:.78rem">Aucun joueur inscrit.</span>'}
</div>
<hr style="border-color:#3a3a6e;margin:12px 0">
<h4 style="margin-bottom:8px">🔑 Changer le PIN admin</h4>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<input class="fi" id="opin" type="password" placeholder="PIN actuel" style="width:110px">
<input class="fi" id="npin" type="password" placeholder="Nouveau PIN" style="width:110px">
<button class="btn-g" onclick="hChgPin()">Modifier</button>
</div>
<div id="pe" style="color:var(--red);font-size:.78rem;margin-top:5px"></div>
</div>`:''}
</div>`;
}

// ── HANDLERS ─────────────────────────────────────────────────
function setTab(t){S.tab=t;S.grp='ALL';render()}
function setGrp(g){S.grp=g;render()}
function tpw(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈'}
function tCpw(){S.cpw=!S.cpw;render()}
function tAdm(){S.admVis=!S.admVis;render()}

function hLogin(){
  const p=document.getElementById('lp')?.value.trim();
  const pw=document.getElementById('lpw')?.value;
  const r=doLogin(p,pw);
  if(r.ok){toast('Bienvenue '+psd(S.user)+' ! 🎉');render()}
  else{const e=document.getElementById('lerr');if(e)e.textContent=r.msg}
}
function hSavePr(id){
  const h=document.getElementById('ph'+id)?.value;
  const a=document.getElementById('pa'+id)?.value;
  if(h===''||a===''){toast('Entre les deux scores !',true);return}
  savePr(id,h,a);toast('Pronostic enregistré ✓');render()
}
function hSetRes(id){
  if(!isAdmin()){toast('Accès refusé.',true);return}
  const h=document.getElementById('rh'+id)?.value;
  const a=document.getElementById('ra'+id)?.value;
  if(h===''||a===''){toast('Score incomplet !',true);return}
  setRes(id,h,a);toast('Score enregistré ✓');render()
}
function hDelRes(id){if(!isAdmin()){toast('Accès refusé.',true);return}delRes(id);toast('Score supprimé');render()}

function hCpw(){
  const o=document.getElementById('opw')?.value;
  const n=document.getElementById('npw')?.value;
  const r=chgPw(o,n);
  if(r.ok){toast('Mot de passe modifié ✓');S.cpw=false;render()}
  else{const e=document.getElementById('cpwe');if(e)e.textContent=r.msg}
}
function hAdmReset(){
  const p=document.getElementById('ap')?.value;
  const n=document.getElementById('anp')?.value;
  const pin=document.getElementById('apin')?.value;
  const r=admReset(p,n,pin);
  const e=document.getElementById('ae');
  if(e){e.textContent=r.ok?'✅ Réinitialisé !':r.msg;e.style.color=r.ok?'var(--grn)':'var(--red)'}
  if(r.ok)toast('Mot de passe réinitialisé ✓')
}
function hTogAdm(){
  if(!isAdmin()){toast('Accès refusé.',true);return}
  const pin=document.getElementById('apm')?.value;
  const e=document.getElementById('ame');
  if(pin!==LS.pin()){if(e)e.textContent='PIN incorrect.';return}
  _adm=!_adm;toast(_adm?'🔐 Mode admin activé':'🔓 Mode admin désactivé');render()
}
function hDelUser(){
  if(!isAdmin()){toast('Accès refusé.',true);return}
  const pseudo=document.getElementById('dup')?.value.trim().toLowerCase();
  const pin=document.getElementById('dpin')?.value;
  const e=document.getElementById('de');
  if(!pseudo){if(e){e.textContent='Entre un pseudo.';e.style.color='var(--red)'}return}
  if(pin!==LS.pin()){if(e){e.textContent='PIN incorrect.';e.style.color='var(--red)'}return}
  if(pseudo===ADMIN_USER){if(e){e.textContent='Impossible de supprimer le compte admin.';e.style.color='var(--red)'}return}
  const u=LS.gu();
  if(!u[pseudo]){if(e){e.textContent='Joueur introuvable.';e.style.color='var(--red)'}return}
  delete u[pseudo];LS.su(u);
  const p=LS.gp();delete p[pseudo];LS.sp(p);
  toast('Compte "'+pseudo+'" supprimé 🗑');render()
}
function prefillDel(k){
  S.admVis=true;render();
  setTimeout(()=>{const i=document.getElementById('dup');if(i)i.value=k},50)
}

  const o=document.getElementById('opin')?.value;
  const n=document.getElementById('npin')?.value;
  const e=document.getElementById('pe');
  if(o!==LS.pin()){if(e){e.textContent='PIN actuel incorrect.';e.style.color='var(--red)'}return}
  if(!n||n.length<3){if(e){e.textContent='PIN trop court.';e.style.color='var(--red)'}return}
  LS.spin(n);if(e){e.textContent='✅ PIN modifié !';e.style.color='var(--grn)'}
}

// ── MOBILE ───────────────────────────────────────────────────
document.getElementById('ham').addEventListener('click',()=>{
  document.getElementById('sb').classList.toggle('open');
  document.getElementById('ov').classList.toggle('open');
});
document.getElementById('ov').addEventListener('click',()=>{
  document.getElementById('sb').classList.remove('open');
  document.getElementById('ov').classList.remove('open');
});

// ── ENTER KEY ────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const lp=document.getElementById('lp'),lpw=document.getElementById('lpw');
    if(lp&&lpw&&(document.activeElement===lp||document.activeElement===lpw))hLogin();
  }
});

// ── PWA ──────────────────────────────────────────────────────
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

// ── INIT ─────────────────────────────────────────────────────
const ses=localStorage.getItem('cdm_ses');
if(ses&&LS.gu()[ses])S.user=ses;
render();
</script>
</body>
</html>
