async function loadAll() {
  if (!sb) return;
  try {
    var r = await Promise.all([
      sb.from('users').select('*'),
      sb.from('pronos').select('*'),
      sb.from('results').select('*'),
      sb.from('config').select('*')
    ]);
    var users = r[0].data || [];
    var pronos = r[1].data || [];
    var results = r[2].data || [];
    var config = r[3].data || [];
    DB.users = users;
    DB.userMap = {};
    for (var i=0; i<users.length; i++) DB.userMap[users[i].pseudo_key] = users[i];
    DB.pronos = {};
    for (var i=0; i<users.length; i++) DB.pronos[users[i].pseudo_key] = {};
    for (var i=0; i<pronos.length; i++) {
      var p = pronos[i];
      var uid = p.user_id;
      var owner = null;
      for (var j=0; j<users.length; j++) { if (users[j].id === uid) { owner = users[j]; break; } }
      if (owner) {
        if (!DB.pronos[owner.pseudo_key]) DB.pronos[owner.pseudo_key] = {};
        DB.pronos[owner.pseudo_key][p.match_id] = {h: p.home_score, a: p.away_score};
      }
    }
    DB.results = {};
    for (var i=0; i<results.length; i++) DB.results[results[i].match_id] = {h: results[i].home_score, a: results[i].away_score};
    for (var i=0; i<config.length; i++) DB.config[config[i].key] = config[i].value;
  } catch(e) { toast('Erreur de chargement: ' + e.message, 'err'); }
}

  var r = await sb.from('pronos').select('*');
  var pronos = r.data || [];
  for (var k in DB.pronos) DB.pronos[k] = {};
  for (var i=0; i<pronos.length; i++) {

function setupRealtime() {
  if (!sb) return;
  sb.channel('db-live')
    .on('postgres_changes', {event:'*', schema:'public', table:'results'}, function(payload) {
      if (payload.eventType === 'DELETE') {
        delete DB.results[payload.old.match_id];
      } else {
        DB.results[payload.new.match_id] = {h: payload.new.home_score, a: payload.new.away_score};
        if (!isAdmin()) toast('Score mis \u00e0 jour en direct ! \u26a1', 'ok');
      }
      render();
    })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'pronos'}, function() {
      reloadPronos().then(function() { if (S.page === 'classement') render(); });
    })
    .subscribe();
}

async function doLogin(pseudo, pw) {
  if (!pseudo || !pw) return {ok:false, msg:'Remplis tous les champs.'};
  if (!sb) return {ok:false, msg:'Supabase non configur\u00e9.'};
  var k = pseudo.toLowerCase().trim(), h = hsh(pw);
  var existing = DB.userMap[k];
  if (existing) {
    if (existing.hash !== h) return {ok:false, msg:'Mot de passe incorrect.'};
  } else {
    var r = await sb.from('users').insert({pseudo_key:k, pseudo_display:pseudo.trim(), hash:h}).select().single();
    if (r.error) return {ok:false, msg:'Erreur: '+r.error.message};
    DB.users.push(r.data); DB.userMap[k] = r.data; DB.pronos[k] = {};
  }
  S.user = k; localStorage.setItem('cdm_ses', k);
  return {ok:true};
}

}
function ptBadge(id, user) {
  var pn=uPronos(user)[id], r=getRes(id); if (!pn||!r) return null;
  if (pn.h===r.h && pn.a===r.a) return 'ex';
  return Math.sign(pn.h-pn.a)===Math.sign(r.h-r.a) ? 'ok' : 'no';
}
function lb() {
  var arr = [];
  for (var i=0; i<DB.users.length; i++) {
    var u = DB.users[i]; if (u.pseudo_key===ADMIN) continue;
    var st=pts(u.pseudo_key), pr=uPronos(u.pseudo_key);
    arr.push({k:u.pseudo_key, ps:u.pseudo_display, np:Object.keys(pr).length, p:st.p, ex:st.ex, ok:st.ok, pl:st.pl});
  }
  arr.sort(function(a,b){return b.p-a.p||b.ex-a.ex||b.ok-a.ok;});
  return arr;
}
function standings(g) {
  var teams=GR[g], res=DB.results, tb={};
  for (var i=0; i<teams.length; i++) tb[teams[i]]={j:0,g:0,n:0,p:0,bp:0,bc:0,d:0,pts:0};
  for (var mi=0; mi<M.length; mi++) {
    var m=M[mi]; if (m.ph!=='POULES'||m.gr!==g) continue;
    var r=res[m.id]; if (!r) continue;
    var h=r.h,a=r.a;
    tb[m.h].j++;tb[m.a].j++;tb[m.h].bp+=h;tb[m.h].bc+=a;tb[m.a].bp+=a;tb[m.a].bc+=h;
    if (h>a){tb[m.h].g++;tb[m.h].pts+=3;tb[m.a].p++;}
    else if(h<a){tb[m.a].g++;tb[m.a].pts+=3;tb[m.h].p++;}
    else{tb[m.h].n++;tb[m.h].pts++;tb[m.a].n++;tb[m.a].pts++;}
    tb[m.h].d=tb[m.h].bp-tb[m.h].bc; tb[m.a].d=tb[m.a].bp-tb[m.a].bc;
  }
  var arr=[]; for (var ti=0;ti<teams.length;ti++) arr.push(Object.assign({name:teams[ti]},tb[teams[ti]]));
  arr.sort(function(a,b){return b.pts-a.pts||b.d-a.d||b.bp-a.bp;});
  return arr;
}

/* ═══════════════════════════════════════════════
   AUTO-SYNC SCORES (football-data.org)
═══════════════════════════════════════════════ */
function getMatchesPendingSync() {
  var now = new Date(), pending = [];
  for (var i=0; i<M.length; i++) {
    var m = M[i];
    if (DB.results[m.id]) continue;
    var kickoff = new Date(m.dt+'T'+m.ti);
    var twoHoursLater = new Date(kickoff.getTime() + 2*60*60*1000);
    if (now >= twoHoursLater) pending.push(m);
  }
  return pending;
}
async function autoFetch(silent) {
  var apikey = DB.config.apikey; if (!apikey) { if (!silent) toast('Cl\u00e9 API manquante', 'err'); return; }
  var pending = getMatchesPendingSync();
  if (!pending.length) { if (!silent) toast('Aucun match \u00e0 synchroniser'); return; }
  if (!silent) toast('Synchronisation en cours... (' + pending.length + ' matchs)');
  try {
    var resp = await fetch('https://api.football-data.org/v4/competitions/WC/matches?status=FINISHED', {
      headers: {'X-Auth-Token': apikey}
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    var matches = data.matches || [];
    var updated = 0;
    for (var i=0; i<matches.length; i++) {
      var am = matches[i];
      if (!am.score || !am.score.fullTime) continue;
      var sc = am.score.fullTime;
      if (sc.home === null || sc.away === null) continue;
      var aHome = APIMAP[am.homeTeam.name] || APIMAP[am.homeTeam.shortName] || '';
      var aAway = APIMAP[am.awayTeam.name] || APIMAP[am.awayTeam.shortName] || '';
      for (var j=0; j<pending.length; j++) {
        if (DB.results[pending[j].id]) continue;
        var hOk = pending[j].h === aHome || (!aHome && pending[j].h.toLowerCase().indexOf((am.homeTeam.shortName||'').toLowerCase()) > -1);
        var aOk = pending[j].a === aAway || (!aAway && pending[j].a.toLowerCase().indexOf((am.awayTeam.shortName||'').toLowerCase()) > -1);
        if (hOk && aOk) {
          await setRes(pending[j].id, sc.home, sc.away);
          updated++; break;
        }
      }
    }
    var stillPending = getMatchesPendingSync().length;
    if (!silent || updated > 0) toast(updated + ' score(s) mis \u00e0 jour \u2713' + (stillPending > 0 ? ' \u2014 ' + stillPending + ' en attente' : ''));
    if (updated > 0) render();
    if (stillPending > 0 && !silent) toast(stillPending + ' score(s) non r\u00e9cup\u00e9r\u00e9(s) \u2014 saisie manuelle disponible', 'info');
  } catch(e) { toast('Erreur API: ' + e.message + ' \u2014 utilisez la saisie manuelle', 'err'); }
}
function startAutoSync() {
  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(function() {
    if (!isAdmin() || !adminMode) return;
    if (!DB.config.apikey) return;
    var pending = getMatchesPendingSync();
    if (pending.length > 0) autoFetch(true);
  }, 5 * 60 * 1000);
}

  var cpwBlock='';
  if (S.cpw) {
    cpwBlock='<div class="card" style="margin-bottom:20px"><h4 style="margin-bottom:12px">&#128274; Changer le mot de passe</h4><div style="display:flex;gap:10px;flex-wrap:wrap"><input class="fi" id="opw" type="password" placeholder="Ancien mot de passe"><input class="fi" id="npw" type="password" placeholder="Nouveau mot de passe"><button class="btn-g" onclick="hCpw()">Modifier</button></div><div id="cpwe" style="color:var(--red);font-size:.78rem;margin-top:5px"></div></div>';
  }
  var pronosH='';
  if (!plist.length) {
    pronosH='<div class="empty">Pas encore de pronostic. <span onclick="go(\'matchs\')" style="color:var(--gold);cursor:pointer;font-weight:700">Pronostiquer &#8594;</span></div>';
  } else {
    var rows='';
    for (var li=0;li<plist.length;li++) {
      var x=plist[li], badge='';
      if (x.r) { badge=x.pt2==='ex'?'<span class="badge ex">&#127919; +3</span>':x.pt2==='ok'?'<span class="badge ok">&#10003; +1</span>':'<span class="badge no">&#10007; 0</span>'; }
      else { badge='<span style="color:var(--muted);font-size:.72rem">En attente</span>'; }
      rows+='<div class="pli"><span class="pmn">'+(FL[x.mm.h]||'')+' '+x.mm.h+' <span style="color:var(--muted)">vs</span> '+x.mm.a+' '+(FL[x.mm.a]||'')+'</span><span class="psc2">'+x.pn.h+' - '+x.pn.a+'</span>'+badge+'</div>';
    }
    pronosH='<div class="card" style="padding:0 20px">'+rows+'</div>';
  }
  return '<div class="phd"><div class="pi2"><div style="width:54px;height:54px;background:rgba(245,166,35,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:2px solid var(--gold)">&#128100;</div><div><div style="font-size:1.7rem;font-weight:900">'+ps.toUpperCase()+'</div><div style="color:var(--muted);font-size:.83rem">'+prk.length+' pronostics enregistr\u00e9s</div></div></div>'
   +'<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn-o" onclick="tCpw()">&#128274; Changer mdp</button><button class="btn-o" onclick="doLogout()">&#8594; D\u00e9connexion</button></div></div>'
   +cpwBlock
   +'<div class="psg"><div class="psc"><div style="font-size:1.2rem;margin-bottom:6px">&#127942;</div><div class="psv">'+st.p+'</div><div class="psl">Points</div></div><div class="psc"><div style="font-size:1.2rem;margin-bottom:6px">&#127919;</div><div class="psv">'+st.ex+'</div><div class="psl">Scores exacts</div></div><div class="psc"><div style="font-size:1.2rem;margin-bottom:6px;color:var(--grn)">&#10003;</div><div class="psv">'+st.ok+'</div><div class="psl">Bons r\u00e9sultats</div></div><div class="psc"><div style="font-size:1.2rem;margin-bottom:6px">&#9201;</div><div class="psv">'+st.pl+'</div><div class="psl">Matchs jou\u00e9s</div></div></div>'
   +'<h3 style="font-size:.95rem;font-weight:800;margin-bottom:12px">MES PRONOSTICS</h3>'+pronosH;
}

/* ═══════════════════════════════════════════════
   PANNEAU ADMIN
═══════════════════════════════════════════════ */
function buildAdminPanel() {
  var arrow=S.adm?'&#9650;':'&#9660;';
  var h='<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr)"><div class="adm-tog" onclick="tAdm()">&#128737; Panneau Admin <span style="margin-left:auto">'+arrow+'</span></div>';
  if (!S.adm) return h+'</div>';
  var admBtnLbl=(adminMode?'&#128275; D\u00e9sactiver':'&#128274; Activer')+' le mode saisie';
  var admStatusH=adminMode?'<p style="color:var(--grn);font-size:.78rem;margin-top:6px">&#10003; Mode admin actif \u2014 inputs de score visibles sur chaque match &amp; bandeau dor\u00e9 en haut.</p>':'';
  var apikey=DB.config.apikey||'';
  var pending=getMatchesPendingSync();
  var pendingH=pending.length>0?('<p style="color:var(--gold);font-size:.78rem;margin-top:6px">&#9889; '+pending.length+' match(s) en attente de score</p>'):'<p style="color:var(--grn);font-size:.78rem;margin-top:6px">&#10003; Tous les scores disponibles sont saisis</p>';
  var allusers=DB.users, userTagsH='';
  for (var ui=0;ui<allusers.length;ui++) {
    var uk=allusers[ui]; if(uk.pseudo_key===ADMIN) continue;
    userTagsH+='<span style="background:#1a1a2e;border:1px solid #3a3a6e;border-radius:6px;padding:4px 10px;font-size:.78rem;display:inline-flex;align-items:center;gap:6px;margin:2px">'+uk.pseudo_display+' <span class="xbtn" data-k="'+uk.pseudo_key+'" style="cursor:pointer;color:var(--red);font-weight:700">&#10005;</span></span>';
  }
  if (!userTagsH) userTagsH='<span style="color:var(--muted);font-size:.78rem">Aucun joueur inscrit.</span>';
  h+='<div class="adm-pan">'
  /* Saisie scores */
  +'<h4 style="margin-bottom:8px">&#9881; Mode saisie des scores r\u00e9els</h4>'
  +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px"><input class="fi" id="apm" type="password" placeholder="PIN admin" style="width:120px"><button class="btn-g" onclick="hTogAdm()">'+admBtnLbl+'</button></div>'
  +'<div id="ame" style="color:var(--red);font-size:.78rem"></div>'+admStatusH+'<hr class="hr2">'
  /* Auto-sync */
  +'<h4 style="margin-bottom:6px">&#128260; Synchronisation automatique des scores</h4>'
  +'<p style="font-size:.75rem;color:var(--muted);margin-bottom:8px;line-height:1.5">Utilise l\'API <a href="https://www.football-data.org/client/register" target="_blank" style="color:var(--gold)">football-data.org</a> (gratuite). D\u00e9tection automatique 2h apr\u00e8s chaque match, puis toutes les 5 min jusqu\'\u00e0 r\u00e9cup\u00e9ration. Si un score n\'est pas trouv\u00e9, vous serez notifi\u00e9 et la saisie manuelle reste disponible.</p>'
  +pendingH
  +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;margin-bottom:6px"><input class="fi" id="apikey" placeholder="Cl\u00e9 API football-data.org" value="'+apikey+'" style="flex:2;min-width:160px"><button class="btn-g" onclick="hSaveKey()" style="flex:0">&#128190; Sauver</button><button class="btn-g" onclick="autoFetch(false)" style="flex:0;background:#3a3a6e;color:#fff">&#8635; Sync</button></div>'
  +'<div id="synce" style="font-size:.75rem;color:var(--muted)"></div><hr class="hr2">'
  /* Reset mdp */
  +'<h4 style="margin-bottom:8px">&#128737; R\u00e9initialisation mot de passe joueur</h4>'
  +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px"><input class="fi" id="ap" placeholder="Pseudo du joueur" style="flex:1;min-width:120px"><input class="fi" id="anp" type="password" placeholder="Nouveau mdp" style="flex:1;min-width:120px"><input class="fi" id="apin" type="password" placeholder="PIN admin" style="width:100px"><button class="btn-g" onclick="hAdmReset()">R\u00e9initialiser</button></div>'
  +'<div id="ae" style="font-size:.78rem;margin-bottom:6px"></div><hr class="hr2">'
  /* Supprimer joueur */
  +'<h4 style="margin-bottom:8px">&#128465; Supprimer un compte joueur</h4>'
  +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px"><input class="fi" id="dup" placeholder="Pseudo \u00e0 supprimer" style="flex:1;min-width:140px"><input class="fi" id="dpin" type="password" placeholder="PIN admin" style="width:100px"><button class="btn-r" onclick="hDelUser()">&#128465; Supprimer</button></div>'
  +'<div id="de" style="font-size:.78rem;margin-bottom:4px"></div>'
  +'<p style="font-size:.72rem;color:var(--muted)">&#9888; Supprime le compte ET tous ses pronostics.</p><hr class="hr2">'
  /* Joueurs inscrits */
  +'<h4 style="margin-bottom:8px">&#128101; Joueurs inscrits ('+DB.users.filter(function(u){return u.pseudo_key!==ADMIN;}).length+')</h4>'
  +'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">'+userTagsH+'</div><hr class="hr2">'
  /* PIN admin */
  +'<h4 style="margin-bottom:8px">&#128273; Changer le PIN admin (actuel en base de donn\u00e9es)</h4>'
  +'<div style="display:flex;gap:8px;flex-wrap:wrap"><input class="fi" id="opin" type="password" placeholder="PIN actuel" style="width:110px"><input class="fi" id="npin" type="password" placeholder="Nouveau PIN" style="width:110px"><button class="btn-g" onclick="hChgPin()">Modifier</button></div>'
  +'<div id="pe" style="color:var(--red);font-size:.78rem;margin-top:5px"></div>'
  +'</div></div>';
  return h;
}

/* ═══════════════════════════════════════════════
   HANDLERS
═══════════════════════════════════════════════ */
function setTab(t) { S.tab=t; S.grp='ALL'; render(); }
function setGrp(g) { S.grp=g; render(); }
function tCpw() { S.cpw=!S.cpw; render(); }
function tAdm() { S.adm=!S.adm; render(); }

async function hLogin() {
  var p=gv('lp').trim(), pw=gv('lpw');
  var r=await doLogin(p,pw);
  if (r.ok) { toast('Bienvenue '+psd(S.user)+' !'); render(); }
  else { var e=document.getElementById('lerr'); if(e) e.textContent=r.msg; }
}
async function hSavePr(id) {
  var hv=gv('ph'+id), av=gv('pa'+id);
  if(hv===''||av===''){ toast('Entre les deux scores !','err'); return; }
  await savePr(id,hv,av); toast('Pronostic enregistr\u00e9 \u2713'); render();
}
async function hSetRes(id) {
  if(!isAdmin()){ toast('Acc\u00e8s refus\u00e9','err'); return; }
  var hv=gv('rh'+id), av=gv('ra'+id);
  if(hv===''||av===''){ toast('Score incomplet !','err'); return; }
  await setRes(id,hv,av); toast('Score enregistr\u00e9 \u2713'); render();
}
async function hDelRes(id) {
  if(!isAdmin()){ toast('Acc\u00e8s refus\u00e9','err'); return; }
  await delRes(id); toast('Score supprim\u00e9'); render();
}
async function hCpw() {
  var o=gv('opw'), n=gv('npw'), r=await chgPw(o,n);
  if(r.ok){ toast('Mot de passe modifi\u00e9 \u2713'); S.cpw=false; render(); }
  else { var e=document.getElementById('cpwe'); if(e) e.textContent=r.msg; }
}
async function hTogAdm() {
  if(!isAdmin()){ toast('Acc\u00e8s refus\u00e9','err'); return; }
  var pin=gv('apm'), e=document.getElementById('ame');
  if(pin!==DB.config.pin){ if(e){e.textContent='PIN incorrect.';} return; }
  adminMode=!adminMode; updateAdminBanner(); toast(adminMode?'Mode admin activ\u00e9 \u26a1':'Mode admin d\u00e9sactiv\u00e9'); render();
}
async function hAdmReset() {
  var p=gv('ap'), n=gv('anp'), pin=gv('apin'), r=await admReset(p,n,pin), e=document.getElementById('ae');
  if(e){e.textContent=r.ok?'R\u00e9initialis\u00e9 !':r.msg; e.style.color=r.ok?'var(--grn)':'var(--red)';}
  if(r.ok) toast('Mot de passe r\u00e9initialis\u00e9 \u2713');
}
async function hDelUser() {
  if(!isAdmin()){ toast('Acc\u00e8s refus\u00e9','err'); return; }
  var pseudo=gv('dup').trim().toLowerCase(), pin=gv('dpin'), e=document.getElementById('de');
  if(!pseudo){ if(e){e.textContent='Entre un pseudo.';e.style.color='var(--red)';} return; }
  if(pin!==DB.config.pin){ if(e){e.textContent='PIN incorrect.';e.style.color='var(--red)';} return; }
  if(pseudo===ADMIN){ if(e){e.textContent='Impossible de supprimer le compte admin.';e.style.color='var(--red)';} return; }
  var uu=DB.userMap[pseudo]; if(!uu){ if(e){e.textContent='Joueur introuvable.';e.style.color='var(--red)';} return; }
  await sb.from('users').delete().eq('id',uu.id);
  DB.users=DB.users.filter(function(u){return u.id!==uu.id;}); delete DB.userMap[pseudo]; delete DB.pronos[pseudo];
  toast('Compte supprim\u00e9'); render();
}
async function hChgPin() {
  var o=gv('opin'), n=gv('npin'), e=document.getElementById('pe');
  if(o!==DB.config.pin){ if(e){e.textContent='PIN actuel incorrect.';e.style.color='var(--red)';} return; }
  if(!n||n.length<3){ if(e){e.textContent='PIN trop court.';e.style.color='var(--red)';} return; }
  await saveConfig('pin',n); if(e){e.textContent='PIN modifi\u00e9 \u2713';e.style.color='var(--grn)';}
}
async function hSaveKey() {
  var k=gv('apikey').trim(); await saveConfig('apikey',k); toast('Cl\u00e9 API enregistr\u00e9e \u2713');
  var e=document.getElementById('synce'); if(e) e.textContent='Cl\u00e9 sauvegard\u00e9e. Cliquez Sync pour tester.';
}

/* ═══════════════════════════════════════════════
   EMERGENCY BACKDOOR
═══════════════════════════════════════════════ */
async function doEmergency() {
  var sec=gv('em-secret'), np=gv('em-np'), npin=gv('em-npin'), emsg=document.getElementById('em-msg');
  if(sec!==EMERGENCY_CODE){ if(emsg){emsg.textContent='Code secret incorrect.';emsg.style.color='var(--red)';} return; }
  if(np.length>=3){
    var uu=DB.userMap[ADMIN];
    if(!uu){
      var r=await sb.from('users').insert({pseudo_key:ADMIN,pseudo_display:'adminprono',hash:hsh(np)}).select().single();
      if(!r.error){DB.users.push(r.data);DB.userMap[ADMIN]=r.data;}
    } else {
      await sb.from('users').update({hash:hsh(np)}).eq('id',uu.id); uu.hash=hsh(np);
    }
  }
  if(npin.length>=3) await saveConfig('pin',npin);
  if(emsg){emsg.textContent='R\u00e9initialisation effectu\u00e9e !';emsg.style.color='var(--grn)';}
  setTimeout(function(){ document.getElementById('emergency-modal').style.display='none'; },2000);
}

/* ═══════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════ */
document.addEventListener('click',function(e){
  if(e.target.classList.contains('xbtn')){
    var k=e.target.getAttribute('data-k'),inp=document.getElementById('dup');
    if(inp&&k){inp.value=k;inp.focus();}
  }
  if(e.target.id==='tpwbtn'){
    var pw=document.getElementById('lpw');
    if(pw){pw.type=pw.type==='password'?'text':'password';e.target.textContent=pw.type==='password'?'\uD83D\uDC41':'\uD83D\uDE48';}
  }
});
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var lp=document.getElementById('lp'),lpw=document.getElementById('lpw');
    if(lp&&lpw&&(document.activeElement===lp||document.activeElement===lpw)) hLogin();
  }
});
document.getElementById('ham').addEventListener('click',function(){document.getElementById('sb').classList.toggle('open');document.getElementById('ov').classList.toggle('open');});
document.getElementById('ov').addEventListener('click',function(){document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('open');});

/* ═══════════════════════════════════════════════
   PWA
═══════════════════════════════════════════════ */
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(r){for(var i=0;i<r.length;i++)r[i].unregister();});
  setTimeout(function(){navigator.serviceWorker.register('./sw.js').catch(function(){});},1500);
}

/* ═══════════════════════════════════════════════
   INITIALISATION
═══════════════════════════════════════════════ */
async function init() {
  document.getElementById('main').innerHTML='<div class="loading-wrap"><div class="spinner"></div></div>';
  if (!initSB()) { render(); return; }
  await loadAll();
  var ses=localStorage.getItem('cdm_ses');
  if(ses&&DB.userMap[ses]) S.user=ses;
  setupRealtime();
  startAutoSync();
  render();
}
init();

</script>
</body>
</html>
